version: 2
updates:
- package-ecosystem: cargo
  directory: "/"
  schedule:
    interval: weekly
    time: "13:00"
  open-pull-requests-limit: 10
  groups:
    all-dependencies:
      patterns:
        - "*"
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: weekly
    time: "13:00"
  open-pull-requests-limit: 10
  groups:
    all-dependencies:
      patterns:
        - "*"
